<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>
			小米商城 - 小米11 Ultra、Redmi K40 Pro、MIX FOLD，小米电视官方网站
		</title>
		
		<link rel="icon" href="./img/mi.ico" type="image/x-icon">
		
		<link rel="stylesheet" href="css/login.css" type="text/css" />
		<link rel="stylesheet" href="./font/iconfont.css" />
		
		<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.js"></script>
	</head>
	<body>
		<div class="login_img">
		</div>
		
		<div class="login_content">
			<div class="header">
				<div class="header_logo">
					<a href="#">
						<img src="img/mi_logo.png" />
						
						<span>
							小米账号
						</span>
					</a>
				</div>
				
				<div class="header_menu">
					<ul class="header_menu_ul">
						<li class="header_menu_li">
							<a href="#">
								用户协议
							</a>
						</li>
						<li class="header_menu_li">
							<a href="#">
								隐私政策
							</a>
						</li>
						<li class="header_menu_li">
							<a href="#">
								帮助中心
							</a>
						</li>
						<li class="header_menu_li">
							<span class="header_division"></span>
							<a href="#">
								中文(简体)
								
								<div class="header_upd_language">
									<span>
										中文(繁體)
									</span>
									<span>
										‎English
									</span>
									
								</div>
							</a>
						</li>
						
					</ul>
					
				</div>
				
			</div>
			
			
			<div class="login">
				<div class="login_qrcod">
					<i class="iconfont">
						&#xe600;
					</i>
				</div>
				
				<div class="login_from">
					<div class="login_from_title">
						<span>
							登录
						</span>
						<span>
							注册
						</span>
					</div>
					
					<div class="login_from_input_div">
						<form action="user_login" method="post">
							<div class="login_from_input_div_item">
								<input type="text" class="input_username" name="username" />
								<label>邮箱/手机号码/小米ID</label>
							</div>
							
							<div class="login_from_input_div_item">
								<input type="text" class="input_password" name="password" />
								<label>密码</label>
							</div>
						
							<input class="input_sub" type="submit" value="登录" />
						</form>
					</div>
					
				</div>
			</div>
			
		</div>
	</body>
</html>
